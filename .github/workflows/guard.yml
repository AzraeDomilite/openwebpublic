name: guard

# Frontier guard (openweb/docs/09) appliqué au dépôt de CODE.
# Tout le site est malléable — SAUF les garde-fous eux-mêmes.
# L'IA ne doit jamais pouvoir modifier ses propres protections (méta-vulnérabilité).
# Cette vérif est un status check REQUIS pour merger (protection de branche).

on:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: L'IA ne peut pas toucher ses propres garde-fous
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Fichiers modifiés :"; echo "$CHANGED"
          PROTECTED='^(\.github/|CODEOWNERS$)'
          BAD=$(echo "$CHANGED" | grep -E "$PROTECTED" || true)
          if [ -n "$BAD" ]; then
            echo "::error::Modification de garde-fous (workflows / CODEOWNERS) — refusée :"
            echo "$BAD"
            exit 1
          fi
          echo "OK : garde-fous intacts."
