name: frontier-guard

# Path guard : une PR (typiquement ouverte par l'agent IA) ne peut modifier QUE la
# zone malléable. C'est la frontière malléable/cœur (openweb/docs/09) appliquée en CI,
# en plus des permissions GitHub et de l'isolation sandbox (openweb/docs/12).

on:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Seuls les chemins malléables peuvent changer
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Fichiers modifiés :"; echo "$CHANGED"
          ALLOWED='^(content/|assets/|README\.md$)'
          BAD=$(echo "$CHANGED" | grep -vE "$ALLOWED" || true)
          if [ -n "$BAD" ]; then
            echo "::error::Modification hors de la zone malléable — refusée :"
            echo "$BAD"
            exit 1
          fi
          echo "OK : uniquement des chemins malléables."

      - name: Le contenu JSON est valide
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          # Nom de fichier passé par env (jamais interpolé dans le code JS) → pas d'injection.
          FILES=$(git diff --name-only "$BASE" "$HEAD" | grep '\.json$' || true)
          if [ -n "$FILES" ]; then
            while IFS= read -r f; do
              FILE="$f" node -e "JSON.parse(require('fs').readFileSync(process.env.FILE,'utf8'))" \
                && echo "JSON valide : $f"
            done <<< "$FILES"
          fi
