name: ci

# Build du site. Status check REQUIS pour merger : une PR ne peut être
# auto-validée que si le site compile (openweb/docs/08).

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (export statique)
        run: npm run build
